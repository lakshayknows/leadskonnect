<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Followthroo · LinkedIn settings</title>
    <style>
      :root { --ink:#0a0a0a; --soft:#6b6b6b; --line:#e5e5e5; --accent:#4b31e6; --soft-bg:#eeebfd; }
      * { box-sizing: border-box; font-family:-apple-system,Segoe UI,Roboto,sans-serif; }
      body { margin:0; background:#f7f7f8; color:var(--ink); }
      .wrap { max-width:720px; margin:0 auto; padding:28px 20px 60px; }
      h1 { font-size:20px; margin:0 0 2px; }
      .sub { color:var(--soft); font-size:13px; margin:0 0 20px; }
      .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px; }
      .card h2 { font-size:14px; margin:0 0 12px; }
      label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--soft); margin:12px 0 4px; }
      input, select, textarea { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; outline:none; background:#fff; }
      input:focus, select:focus, textarea:focus { border-color:var(--ink); }
      .row { display:flex; gap:12px; }
      .row > div { flex:1; }
      button { border:0; border-radius:8px; padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer; }
      .primary { background:var(--ink); color:#fff; }
      .ghost { background:#fff; border:1px solid var(--line); color:var(--ink); }
      .accent { background:var(--accent); color:#fff; }
      .muted { color:var(--soft); font-size:12px; }
      .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:var(--soft-bg); color:#3a20c4; font-size:11px; font-weight:600; }
      .camp { border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; }
      .camp-head { display:flex; align-items:center; gap:8px; }
      .camp-head input[type=checkbox] { width:auto; }
      .camp-head .name { font-weight:600; font-size:13px; flex:1; }
      .camp-cfg { display:flex; gap:10px; margin-top:8px; }
      .camp-cfg > div { flex:1; }
      .banner { border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:14px; }
      .ok { background:#ecfdf5; color:#065f46; }
      .err { background:#fef2f2; color:#b91c1c; }
      .hide { display:none; }
      .flex { display:flex; align-items:center; justify-content:space-between; gap:12px; }
      a { color:var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Followthroo · LinkedIn</h1>
      <p class="sub">Configure how the extension drains your LinkedIn outreach queue.</p>

      <div id="banner"></div>

      <div class="card">
        <h2>Connection</h2>
        <label>App URL</label>
        <input id="apiBase" placeholder="https://www.followthroo.com" />
        <label>Connection token <span class="muted">(from the app → Settings → LinkedIn)</span></label>
        <input id="token" placeholder="Paste your token" />
        <div class="flex" style="margin-top:12px">
          <span id="connStatus" class="muted">Not connected.</span>
          <button class="primary" id="connect">Connect</button>
        </div>
      </div>

      <div id="config" class="hide">
        <div class="card">
          <h2>Global limits</h2>
          <div class="row">
            <div><label>Daily invite cap</label><input id="cap" type="number" min="1" max="100" /></div>
            <div><label>Min delay (sec)</label><input id="minD" type="number" min="10" /></div>
            <div><label>Max delay (sec)</label><input id="maxD" type="number" min="15" /></div>
            <div><label>Default action</label>
              <select id="mode"><option value="auto">Auto</option><option value="invite">Invite only</option><option value="message">Message only</option></select>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="flex"><h2 style="margin:0">Campaigns</h2><span class="muted">Tick campaigns to run. None ticked = run all.</span></div>
          <div id="campaigns" style="margin-top:12px"></div>
        </div>

        <div class="flex" style="margin-bottom:20px">
          <span id="queueInfo" class="muted"></span>
          <button class="primary" id="save">Save settings</button>
        </div>

        <div class="card">
          <h2>Run a group now</h2>
          <p class="muted">Queue LinkedIn actions for every contact in a group that has a profile link.</p>
          <label>Group</label>
          <select id="runGroup"></select>
          <label>Note / message</label>
          <textarea id="runNote" rows="3" placeholder="Hi {{firstName}}, would love to connect!"></textarea>
          <div class="row" style="margin-top:10px; align-items:end">
            <div><label>Action</label>
              <select id="runType"><option value="auto">Auto</option><option value="invite">Invite</option><option value="message">Message</option></select>
            </div>
            <div style="flex:0 0 auto"><button class="accent" id="run">Queue actions</button></div>
          </div>
        </div>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
